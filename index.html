<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>TM Jobbhub</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
margin:0;
padding:40px;
}

h1{
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:40px;
}

.card{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 10px rgba(0,0,0,0.08);
text-align:center;
text-decoration:none;
color:black;
font-size:18px;
}

.card:hover{
transform:translateY(-4px);
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<script>

let kode = prompt("Skriv inn tilgangskode for Jobbhub");

if(kode !== "4619"){
document.body.innerHTML="<h2 style='text-align:center;margin-top:100px;font-family:Arial;'>Feil kode</h2>";
throw new Error("Stop");
}

</script>

<h1>Traktor og Maskin – Jobbhub</h1>

<div class="grid">

<a class="card" href="https://traktorogmaskin.github.io/PDF-til-JPG/">
PDF → JPG
</a>

<a class="card" href="https://traktorogmaskin.github.io/AVIF-til-JPG-generator/">
AVIF → JPG
</a>

<a class="card" href="https://traktorogmaskin.github.io/Produktark/">
Produktark generator
</a>

<a class="card" href="https://traktorogmaskin.github.io/tilhengerkalkulator/">
Tilhengerkalkulator
</a>

<a class="card" href="https://traktorogmaskin.github.io/leasingkalkulator/">
Leasingkalkulator
</a>

</div>

</body>
</html>
